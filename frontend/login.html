<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - CyreneBot 控制台</title>
    <style>
      :root {
        color: #f3f4f6;
        background: #080b14;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        color: #f3f4f6;
        background:
          radial-gradient(circle at top right, rgba(0, 242, 254, 0.14), transparent 34rem),
          linear-gradient(135deg, #080b14 0%, #101522 100%);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .login-panel {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: rgba(13, 18, 30, 0.86);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      }

      .brand {
        display: grid;
        gap: 8px;
        margin-bottom: 26px;
      }

      .brand-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        color: #00f2fe;
        border: 1px solid rgba(0, 242, 254, 0.3);
        border-radius: 12px;
        background: rgba(0, 242, 254, 0.11);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
        font-weight: 750;
        letter-spacing: 0;
      }

      p {
        color: #9ca3af;
        font-size: 14px;
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #aab0bd;
        font-size: 13px;
        font-weight: 650;
      }

      input {
        width: 100%;
        height: 44px;
        min-width: 0;
        padding: 0 14px;
        color: #f3f4f6;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        outline: none;
        background: rgba(255, 255, 255, 0.05);
      }

      input:focus {
        border-color: #00f2fe;
        box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.15);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 16px;
        color: #061114;
        border: 0;
        border-radius: 12px;
        background: #00f2fe;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: #67f8ff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .error {
        display: none;
        min-height: 38px;
        padding: 10px 12px;
        color: #fecaca;
        border: 1px solid rgba(248, 113, 113, 0.28);
        border-radius: 12px;
        background: rgba(248, 113, 113, 0.12);
        font-size: 13px;
        line-height: 1.45;
      }

      .error.visible {
        display: block;
      }

      .footer {
        margin-top: 18px;
        color: #6b7280;
        text-align: center;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="login-panel" aria-labelledby="login-title">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M7 8h10M7 12h7M5 4h14a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4v-4H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <div>
            <h1 id="login-title">登录 CyreneBot</h1>
            <p>进入控制台前需要管理员凭据。</p>
          </div>
        </div>

        <form id="login-form">
          <label>
            用户名
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <div id="login-error" class="error" role="alert"></div>
          <button id="submit-button" type="submit">登录</button>
        </form>
        <div class="footer">/console/login</div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#login-form")
      const errorBox = document.querySelector("#login-error")
      const submitButton = document.querySelector("#submit-button")

      form.addEventListener("submit", async (event) => {
        event.preventDefault()
        errorBox.textContent = ""
        errorBox.classList.remove("visible")
        submitButton.disabled = true
        submitButton.textContent = "正在登录..."

        const body = new URLSearchParams(new FormData(form))
        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            body,
            credentials: "include",
          })
          if (!response.ok) {
            const payload = await response.json().catch(() => ({}))
            throw new Error(payload.detail || response.statusText || "登录失败")
          }
          window.location.assign("/console")
        } catch (error) {
          errorBox.textContent = error instanceof Error ? error.message : "登录失败"
          errorBox.classList.add("visible")
        } finally {
          submitButton.disabled = false
          submitButton.textContent = "登录"
        }
      })
    </script>
  </body>
</html>
