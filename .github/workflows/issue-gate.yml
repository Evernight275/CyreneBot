name: Issue Gate

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  validate:
    name: Issue Evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate issue body
        id: validate
        continue-on-error: true
        run: python .github/scripts/validate_issue_body.py "$GITHUB_EVENT_PATH" issue-gate-comment.md

      - name: Comment on invalid issue
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue comment "$ISSUE_NUMBER" --body-file issue-gate-comment.md

      - name: Close invalid issue
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --reason "not planned"
